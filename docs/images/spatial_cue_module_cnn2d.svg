<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 990"
     font-family="'Segoe UI', Arial, sans-serif"
     version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- ── Arrow markers ──────────────────────────────────────────────────── -->
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#444444"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#2d5f8c"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#b84a00"/>
    </marker>
    <marker id="arr-white" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#ffffffb0"/>
    </marker>
    <!-- ── Gradients ──────────────────────────────────────────────────────── -->
    <linearGradient id="g-input" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#1a252f"/>
    </linearGradient>
    <linearGradient id="g-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5f8c"/>
      <stop offset="100%" style="stop-color:#1a3d5e"/>
    </linearGradient>
    <linearGradient id="g-orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b84a00"/>
      <stop offset="100%" style="stop-color:#8a3700"/>
    </linearGradient>
    <linearGradient id="g-op" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a4e"/>
      <stop offset="100%" style="stop-color:#26263a"/>
    </linearGradient>
    <!-- ── Drop shadow ────────────────────────────────────────────────────── -->
    <filter id="sh">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- ════════════════════════════════════════════════════════════════════════
       BACKGROUND
       ════════════════════════════════════════════════════════════════════════ -->
  <rect width="900" height="990" fill="#ffffff"/>

  <!-- ════════════════════════════════════════════════════════════════════════
       TITLE
       ════════════════════════════════════════════════════════════════════════ -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">
    SpatialCueModule2D — Internal Architecture
  </text>

  <!-- ════════════════════════════════════════════════════════════════════════
       LEGEND
       ════════════════════════════════════════════════════════════════════════ -->
  <rect x="692" y="42" width="12" height="12" rx="2" fill="url(#g-blue)"/>
  <text x="710" y="53" font-size="9" fill="#333333">Feature extraction (frozen)</text>
  <rect x="692" y="60" width="12" height="12" rx="2" fill="url(#g-orange)"/>
  <text x="710" y="71" font-size="9" fill="#333333">Correction CNN (trainable)</text>
  <rect x="692" y="78" width="12" height="12" rx="2" fill="url(#g-op)"/>
  <text x="710" y="89" font-size="9" fill="#333333">Arithmetic operation</text>

  <!-- ════════════════════════════════════════════════════════════════════════
       INPUT BLOCK
       ════════════════════════════════════════════════════════════════════════ -->
  <rect x="350" y="45" width="200" height="50" rx="6" fill="url(#g-input)" filter="url(#sh)"/>
  <text x="450" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">source_est</text>
  <text x="450" y="84" text-anchor="middle" font-size="10" fill="#aabbcc">(B, 2, T)</text>

  <!-- Arrow: Input → ILD -->
  <line x1="450" y1="95" x2="450" y2="128" stroke="#444444" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="464" y="113" font-size="9" fill="#666666">split L / R</text>

  <!-- ════════════════════════════════════════════════════════════════════════
       compute_ild_bands
       ════════════════════════════════════════════════════════════════════════ -->
  <rect x="255" y="130" width="390" height="72" rx="6" fill="url(#g-blue)" filter="url(#sh)"/>
  <text x="450" y="154" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">compute_ild_bands</text>
  <text x="450" y="172" text-anchor="middle" font-size="9" fill="#aaccee">STFT(L, R)  →  per-sub-band ILD  (n_bands = 32)</text>
  <text x="450" y="188" text-anchor="middle" font-size="9" fill="#aaccee">(B, n_bands, T_frames)</text>

  <!-- Arrow: ILD → CNN  (with unsqueeze annotation) -->
  <line x1="450" y1="202" x2="450" y2="307" stroke="#2d5f8c" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <text x="464" y="222" font-size="9" fill="#2d5f8c">(B, n_bands, T_frames)</text>
  <text x="464" y="237" font-size="9" fill="#2d5f8c">→  unsqueeze(1)</text>
  <text x="464" y="252" font-size="9" fill="#2d5f8c">(B, 1, n_bands, T_frames)</text>

  <!-- ════════════════════════════════════════════════════════════════════════
       BIG CNN BOX  (y=310 … y=676)
       ════════════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="310" width="780" height="366" rx="8" fill="url(#g-orange)" filter="url(#sh)"/>
  <text x="450" y="329" text-anchor="middle" font-size="11" fill="#ffccaa">SpatialCueModule2D  —  Correction CNN  (trainable  ·  spectro-temporal Conv2d)</text>

  <!-- Dashed divider between the two branches -->
  <line x1="456" y1="337" x2="456" y2="662" stroke="#ffffff30" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Branch labels -->
  <text x="261" y="348" text-anchor="middle" font-size="10" font-style="italic" fill="#ffddbb">Local Branch</text>
  <text x="656" y="348" text-anchor="middle" font-size="10" font-style="italic" fill="#ffddbb">Global Context Branch</text>

  <!-- ──────────────────────────────────────────────────────────────────────
       LOCAL BRANCH
       ────────────────────────────────────────────────────────────────────── -->

  <!-- layer1: y=355–401  [h1] -->
  <rect x="78" y="355" width="366" height="46" rx="4" fill="#ffffff1a"/>
  <text x="261" y="373" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#ffffff">Conv2d(1→32,  k=3×7,  pad=1×3)  ·  GroupNorm(8, 32)  ·  ReLU</text>
  <text x="261" y="389" text-anchor="middle" font-size="9" fill="#ffddbb">→  h1   (B, 32, n_bands, T_frames)</text>

  <!-- Residual skip: left edge of layer1 → left margin → add circle -->
  <line x1="78"  y1="378" x2="66"  y2="378" stroke="#ffffffb0" stroke-width="1.4" stroke-dasharray="5,3"/>
  <line x1="66"  y1="378" x2="66"  y2="544" stroke="#ffffffb0" stroke-width="1.4" stroke-dasharray="5,3"/>
  <line x1="66"  y1="544" x2="247" y2="544" stroke="#ffffffb0" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arr-white)"/>
  <text x="56" y="468" text-anchor="middle" font-size="8" fill="#ffddbb"
        transform="rotate(-90,56,468)">residual  h1</text>

  <!-- Arrow layer1 → layer2 -->
  <line x1="261" y1="401" x2="261" y2="413" stroke="#ffffffb0" stroke-width="1.4" marker-end="url(#arr-white)"/>

  <!-- layer2: y=415–461 -->
  <rect x="78" y="415" width="366" height="46" rx="4" fill="#ffffff1a"/>
  <text x="261" y="433" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#ffffff">Conv2d(32→32,  k=3×7,  pad=1×3)  ·  GroupNorm(8, 32)  ·  ReLU</text>
  <text x="261" y="449" text-anchor="middle" font-size="9" fill="#ffddbb">(B, 32, n_bands, T_frames)</text>

  <!-- Arrow layer2 → layer3 -->
  <line x1="261" y1="461" x2="261" y2="473" stroke="#ffffffb0" stroke-width="1.4" marker-end="url(#arr-white)"/>

  <!-- layer3: y=475–521 -->
  <rect x="78" y="475" width="366" height="46" rx="4" fill="#ffffff1a"/>
  <text x="261" y="493" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#ffffff">Conv2d(32→32,  k=3×7,  pad=1×3)  ·  GroupNorm(8, 32)  ·  ReLU</text>
  <text x="261" y="509" text-anchor="middle" font-size="9" fill="#ffddbb">(B, 32, n_bands, T_frames)</text>

  <!-- Arrow layer3 → add circle (top of circle = y=530) -->
  <line x1="261" y1="521" x2="261" y2="530" stroke="#ffffffb0" stroke-width="1.4" marker-end="url(#arr-white)"/>

  <!-- Add circle ⊕ (local residual)  center (261, 544)  r=14 -->
  <circle cx="261" cy="544" r="14" fill="url(#g-op)" stroke="#ffffff60" stroke-width="1.2"/>
  <text x="261" y="550" text-anchor="middle" font-size="13" fill="#ffffff">⊕</text>
  <text x="281" y="548" font-size="9" fill="#ffddbb">h3</text>

  <!-- Line from local add circle down to merge level (y=590) -->
  <line x1="261" y1="558" x2="261" y2="590" stroke="#ffffffb0" stroke-width="1.4"/>

  <!-- ──────────────────────────────────────────────────────────────────────
       GLOBAL CONTEXT BRANCH
       ────────────────────────────────────────────────────────────────────── -->

  <!-- mean over time: y=355–391 -->
  <rect x="466" y="355" width="364" height="36" rx="4" fill="#ffffff1a"/>
  <text x="648" y="369" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#ffffff">x.mean(dim=−1,  keepdim=True)</text>
  <text x="648" y="383" text-anchor="middle" font-size="9" fill="#ffddbb">(B, 1, n_bands, 1)  —  DC ILD per band</text>

  <!-- Arrow mean → global_conv -->
  <line x1="648" y1="391" x2="648" y2="405" stroke="#ffffffb0" stroke-width="1.4" marker-end="url(#arr-white)"/>

  <!-- global_conv: y=407–453 -->
  <rect x="466" y="407" width="364" height="46" rx="4" fill="#ffffff1a"/>
  <text x="648" y="425" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#ffffff">Conv2d(1→32,  k=3×1,  pad=1×0)  →  ReLU</text>
  <text x="648" y="441" text-anchor="middle" font-size="9" fill="#ffddbb">(B, 32, n_bands, 1)  [g]</text>

  <!-- Line from global_conv down to merge level, with broadcast annotations -->
  <line x1="648" y1="453" x2="648" y2="590" stroke="#ffffffb0" stroke-width="1.4"/>
  <text x="662" y="481" font-size="9" fill="#ffddbb">broadcast over T dimension</text>
  <text x="662" y="495" font-size="9" fill="#ffddbb">(B, 32, n_bands, T_frames)</text>

  <!-- ──────────────────────────────────────────────────────────────────────
       MERGE CIRCLE ⊕   h3 + g
       ────────────────────────────────────────────────────────────────────── -->
  <line x1="261" y1="590" x2="435" y2="590" stroke="#ffffffb0" stroke-width="1.4" marker-end="url(#arr-white)"/>
  <line x1="648" y1="590" x2="465" y2="590" stroke="#ffffffb0" stroke-width="1.4" marker-end="url(#arr-white)"/>
  <circle cx="450" cy="590" r="15" fill="url(#g-op)" stroke="#ffffff60" stroke-width="1.2"/>
  <text x="450" y="596" text-anchor="middle" font-size="13" fill="#ffffff">⊕</text>
  <text x="470" y="585" font-size="9" fill="#ffddbb">h3 + g</text>

  <!-- Arrow merge → projection -->
  <line x1="450" y1="605" x2="450" y2="618" stroke="#ffffffb0" stroke-width="1.4" marker-end="url(#arr-white)"/>

  <!-- ──────────────────────────────────────────────────────────────────────
       FUSION / OUTPUT PROJECTION
       ────────────────────────────────────────────────────────────────────── -->
  <rect x="155" y="620" width="590" height="44" rx="4" fill="#ffffff1a"/>
  <text x="450" y="638" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#ffffff">proj: Conv2d(32→1,  k=1×1,  zero-init)  →  Tanh  →  squeeze(1)</text>
  <text x="450" y="654" text-anchor="middle" font-size="9" fill="#ffddbb">delta ∈ [−1, +1]  ·  (B, n_bands, T_frames)</text>

  <!-- CNN box bottom: y = 310 + 366 = 676 -->

  <!-- ════════════════════════════════════════════════════════════════════════
       × ild_scale
       ════════════════════════════════════════════════════════════════════════ -->
  <line x1="450" y1="676" x2="450" y2="705" stroke="#b84a00" stroke-width="1.8" marker-end="url(#arr-orange)"/>
  <text x="464" y="694" font-size="9" fill="#b84a00">delta ∈ [−1, +1]  (B, n_bands, T_frames)</text>

  <rect x="335" y="708" width="230" height="38" rx="6" fill="url(#g-op)" filter="url(#sh)"/>
  <text x="450" y="724" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">× ild_scale</text>
  <text x="450" y="739" text-anchor="middle" font-size="9" fill="#aabbcc">delta_ild ∈ [−ild_scale, +ild_scale]  dB</text>

  <!-- Arrow → ÷ 2 -->
  <line x1="450" y1="746" x2="450" y2="769" stroke="#444444" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════════════════════════════════
       ÷ 2 = half
       ════════════════════════════════════════════════════════════════════════ -->
  <rect x="390" y="771" width="120" height="32" rx="6" fill="url(#g-op)" filter="url(#sh)"/>
  <text x="450" y="792" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">÷ 2  =  half</text>

  <!-- ÷2 midheight y=787, left x=390, right x=510 -->
  <!-- Left branch: (390,787) → (195,787) → (195,825) -->
  <line x1="390" y1="787" x2="195" y2="787" stroke="#444444" stroke-width="1.4"/>
  <line x1="195" y1="787" x2="195" y2="825" stroke="#444444" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="290" y="781" text-anchor="middle" font-size="9" fill="#666666">−half  (to L)</text>

  <!-- Right branch: (510,787) → (715,787) → (715,825) -->
  <line x1="510" y1="787" x2="715" y2="787" stroke="#444444" stroke-width="1.4"/>
  <line x1="715" y1="787" x2="715" y2="825" stroke="#444444" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="614" y="781" text-anchor="middle" font-size="9" fill="#666666">+half  (to R)</text>

  <!-- ════════════════════════════════════════════════════════════════════════
       L GAIN BLOCK   center x=195
       ════════════════════════════════════════════════════════════════════════ -->
  <rect x="65" y="827" width="260" height="62" rx="6" fill="url(#g-blue)" filter="url(#sh)"/>
  <text x="195" y="845" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">_apply_subband_gain(L, −half)</text>
  <text x="195" y="860" text-anchor="middle" font-size="9" fill="#aaccee">STFT  →  gain_l = 10^(+half/20)  →  ISTFT</text>
  <text x="195" y="875" text-anchor="middle" font-size="9" fill="#aaccee">L corrected  (B, T)</text>

  <!-- ════════════════════════════════════════════════════════════════════════
       R GAIN BLOCK   center x=715
       ════════════════════════════════════════════════════════════════════════ -->
  <rect x="585" y="827" width="260" height="62" rx="6" fill="url(#g-blue)" filter="url(#sh)"/>
  <text x="715" y="845" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">_apply_subband_gain(R, +half)</text>
  <text x="715" y="860" text-anchor="middle" font-size="9" fill="#aaccee">STFT  →  gain_r = 10^(−half/20)  →  ISTFT</text>
  <text x="715" y="875" text-anchor="middle" font-size="9" fill="#aaccee">R corrected  (B, T)</text>

  <!-- ════════════════════════════════════════════════════════════════════════
       MERGE: stack → output
       L/R bottom: y=889
       ════════════════════════════════════════════════════════════════════════ -->
  <line x1="195" y1="889" x2="195" y2="914" stroke="#444444" stroke-width="1.4"/>
  <line x1="195" y1="914" x2="450" y2="914" stroke="#444444" stroke-width="1.4"/>
  <line x1="715" y1="889" x2="715" y2="914" stroke="#444444" stroke-width="1.4"/>
  <line x1="715" y1="914" x2="450" y2="914" stroke="#444444" stroke-width="1.4"/>
  <line x1="450" y1="914" x2="450" y2="923" stroke="#444444" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="464" y="910" font-size="9" fill="#666666">stack</text>

  <!-- ════════════════════════════════════════════════════════════════════════
       OUTPUT BLOCK
       ════════════════════════════════════════════════════════════════════════ -->
  <rect x="350" y="925" width="200" height="50" rx="6" fill="url(#g-input)" filter="url(#sh)"/>
  <text x="450" y="947" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">corrected</text>
  <text x="450" y="964" text-anchor="middle" font-size="10" fill="#aabbcc">(B, 2, T)</text>

  <!-- ════════════════════════════════════════════════════════════════════════
       FOOTER NOTE
       ════════════════════════════════════════════════════════════════════════ -->
  <text x="450" y="983" text-anchor="middle" font-size="9" font-style="italic" fill="#888888">
    Global branch captures DC ILD offset; local branch models fine spectro-temporal variations.  Correction is symmetric: gain_l · gain_r = 1.
  </text>
</svg>